server:
  port: 8080

spring:
  application:
    name: issueflow
  datasource:
    url: jdbc:postgresql://localhost:5432/issueflow
    username: issueflow
    password: issueflow
    driverClassName: org.postgresql.Driver
    platform: postgres
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: update
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-change-me-dev-only-secret-change-me}
    expirationSeconds: ${JWT_EXPIRATION_SECONDS:3600}
